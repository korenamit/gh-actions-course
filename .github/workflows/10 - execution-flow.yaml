name: 10 - Controlling The Execution Flow

on:
    workflow_dispatch:
        inputs:
            pass-unit-tests:
                type: boolean
                description: 'whether to pass unit tests or not'                
                default: true
jobs:
    lint-build:
        runs-on: ubuntu-latest
        steps:
            - name: Lint and Build
              run: |
                echo "Linting and building the project..."
    unit-test:
        runs-on: ubuntu-latest
        steps:
            - name: Running Unit Tests
              run: |
                echo "Running unit tests..."
            - name: Failing Unit Tests
              if: ${{ !inputs.pass-unit-tests }}
              run: |
                echo "Unit tests failed!"
                exit 1
    deploy-nonprod:
        runs-on: ubuntu-latest
        needs: [lint-build, unit-test]
        steps:
            - name: Deploying to Non-Prod
              run: |
                echo "Deploying to non-production environment..."
    e2e-tests:
        runs-on: ubuntu-latest
        needs: [deploy-nonprod]
        steps:
            - name: Running E2E Tests
              run: |
                echo "Running E2E tests..."
    load-tests:
        runs-on: ubuntu-latest
        needs: [deploy-nonprod]
        steps:
            - name: Running Load Tests
              run: |
                echo "Running load tests..."
    deploy-prod:
        runs-on: ubuntu-latest
        needs: [e2e-tests, load-tests]
        