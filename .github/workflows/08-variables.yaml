
name: 08 - Using Variables

on:
    push:
    workflow_dispatch:       
env:
    WORKFLOW_VAR: "I am a workflow-level environment variable"
    OVERWRITTEN: "I will be overwritten"
    UNDEFINED_VAR_WITH_DEFAULT: ${{vars.UNDEFINED_VAR || 'I AM DEFAULT VALUE FOR UNDEFINED'}}"
jobs:
    echo:
        runs-on: ubuntu-latest
        env:
            JOB_VAR: "I am a job-level environment variable"
            OVERWRITTEN: "I have been overwritten"
        steps:
            - name: Print Environment Variables
              env:
                STEP_VAR: "I am a step-level environment variable" 
              run: |
                echo "Step env var: ${{env.STEP_VAR}}"
                echo "Job env var: ${{env.JOB_VAR}}"
                echo "Workflow env var: ${{env.WORKFLOW_VAR}}"
                echo "Overwritten var: ${{env.OVERWRITTEN}}"
            - name: Overwrite Job Variable              
              env:
                  OVERWRITTEN: "I have been overwritten at the step level"
              run: |
                echo "Step env var: ${{env.OVERWRITTEN}}"
    echo2:
        runs-on: ubuntu-latest
        steps:
          - name: Print Variables
            run: |
                echo "Org Var: ${{vars.ORG_VAR}}"
                echo "Org overwritten var: ${{vars.OVERWRITTEN_VAR}}"
                echo "Repo Var: ${{ vars.REPOSITORY_VAR }}"
    echo-prod:
        runs-on: ubuntu-latest
        environment: prod
        steps:
            - name: Print Prod Variables
              run: |
                echo "Org Var: ${{vars.ORG_VAR}}"
                echo "Org overwritten var: ${{vars.OVERWRITTEN_VAR}}"
                echo "Repo Var: ${{ vars.REPOSITORY_VAR }}"
                echo "Environment Var: ${{vars.TARGET_VAR}}"
                
    echo-undefined:
        runs-on: ubuntu-latest
        steps:
            - name: Print Undefined Variables
              run: |
                echo "Org Var: ${{ENV.UNDEFINED_VAR_WITH_DEFAULT}}"
          
