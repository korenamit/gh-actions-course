name: 03 - Workflow Runners

on: push

jobs:  
    ubuntu-echo:
        runs-on: ubuntu-latest
        steps:
            - name: Show OS 
              run: |
                echo "Running ubuntu runner."
                echo "Runner OS: $RUNNER_OS"
    windows-echo:
        runs-on: windows-latest
        steps:
            - name: Show OS 
              run: |
                echo "Running windows runner."
                echo "Runner OS: $RUNNER_OS"
