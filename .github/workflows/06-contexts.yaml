name: 06 - Contexts
run-name: 06 - Contexts | DEBUG - ${{inputs.debug}} | Version - ${{inputs.version}}
on:
    push:
    workflow_dispatch:
        inputs:
            debug:
                type: boolean
                default: false
            version:
                type: choice
                options:
                    - v1
                    - v2 
                    - v3
                    - v4
                    - v5                           
                default: v1
env:
    MY_WORKFLOW_VAR: "workflow_orig"
    MY_OVERWRITTEN_VAR: "workflow_overwrite"
jobs:
    echo-data:
        runs-on: ubuntu-latest
        env:
            MY_JOB_VAR: "This is a job-level variable"
            MY_OVERWRITTEN_VAR: "job"
        steps:
            - name: Display Information
              run: |
                echo "Event Name: ${{ github.event_name }}"            
                echo "Ref: ${{ github.ref }}"                    
                echo "SHA: ${{ github.sha }}"
                echo "Actor: ${{ github.actor }}"
                echo "Workflow: ${{ github.workflow }}"
                echo "Run ID: ${{ github.run_id }}"
                echo "Run Number: ${{ github.run_number }}"
                echo "Repository: ${{ github.repository }}"   
            - name: Retrieve Variable
              run: |
                echo "The value of the variable is: ${{ vars.MY_VAR  }}"
            - name: Display Environment Variables
              env:
                MY_OVERWRITTEN_VAR: "step"                 
              run: |
                echo "Workflow env: ${{ env.MY_WORKFLOW_VAR }}"            
                echo "Overwritten env: ${{ env.MY_OVERWRITTEN_VAR }}"
            - name: Display Environment Variables            
              run: |
                echo "Workflow env: ${{ env.MY_WORKFLOW_VAR }}"            
                echo "Overwritten env: ${{ env.MY_OVERWRITTEN_VAR }}"
    echo-data2:
        runs-on: ubuntu-latest
        steps:
            - name: Print Env Variables
              run: |
                echo "Workflow env: $MY_WORKFLOW_VAR"            
                echo "Overwritten env: $MY_OVERWRITTEN_VAR"

            
