name: 09 - Using Functions

on:
    pull_request:
    workflow_dispatch:
jobs:
    echo1:
        runs-on: ubuntu-latest
        steps:
            - name: Print PR title
              run: |
                echo "PR title: ${{ github.event.pull_request.title }}"
            - name: Print PR labels
              run: |          
                cat << EOF   
                echo "PR labels: ${{ tojson(github.event.pull_request.labels) }}"
                EOF
            - name: Bug Step
              if: ${{!cancelled() && contains(github.event.pull_request.title, 'fix')}}
              run: echo "I am a bug fix"
            - name: Sleep 30 seconds
              run: sleep 30
            - name: Failing Step
              run: |
                echo "This step will fail"
                exit 1
            - name: Failing Step
              run: |
                sleep 30
                echo "This step will fail"
                exit 1
            - name: This step will be skipped
              if: ${{ success() }}
              run: echo "I will print if previous steps succeeded" 
            - name: I Will Execute 
              if: ${{ failure() }}
              run: echo "I will print if any previous steps failed"
            - name: I Will Execute 
              if: ${{ !cancelled() }}
              run: echo "I will always print, except if workflow cancelled"
            - name: I Will Execute when cancelled
              if: ${{ cancelled() }}
              run: echo "I will print if workflow cancelled"
